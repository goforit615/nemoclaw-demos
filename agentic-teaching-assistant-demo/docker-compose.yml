# Docker Compose for AgenticTA (Study Buddy)
# Minimal setup: agenticta app + Study Break Games

services:
  agenticta:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
    image: ta_master:latest
    container_name: agenticta
    environment:
      - INFERENCE_API_KEY=${INFERENCE_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - AGENTICTA_DEBUG=${AGENTICTA_DEBUG:-false}
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - INGESTOR_SERVER_HOST=http://ingestor-server:8082
      - RAG_SERVER_HOST=http://rag-server:8081
    volumes:
      - .:/workspace
      - ./mnt:/workspace/mnt
    ports:
      - "7860:7860"  # Gradio UI
      - "8000:8000"  # FastAPI backend
    stdin_open: true
    tty: true
    command: /bin/bash
